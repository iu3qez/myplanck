# Ergogen config for P48v2 - 4x12 Ortholinear Keyboard
# MCU: RP2350
# Features: Choc v1/v2 hotswap, per-key SK6812-MINI-E RGB LEDs
# Matrix: 4 rows x 12 columns with diodes
#
# LED chain order (serpentine):
#   Row top    (L→R): LED 0-11
#   Row home   (R→L): LED 12-23
#   Row bottom (L→R): LED 24-35
#   Row mod    (R→L): LED 36-47
# MCU LED data pin: GP16

meta:
  engine: 4.1.0

units:
  kx: 18     # Choc key spacing horizontal
  ky: 17     # Choc key spacing vertical

points:
  zones:
    matrix:
      key:
        padding: 1ky
        spread: 1kx
      anchor:
        shift: [5.5kx, 1.5ky]
      columns:
        outer_l:
          key:
            column_net: COL0
          rows:
            mod:
              colrow: CR_0_3
              led_din: LED47
              led_dout: LED48
            bottom:
              colrow: CR_0_2
              led_din: LED24
              led_dout: LED25
            home:
              colrow: CR_0_1
              led_din: LED23
              led_dout: LED24
            top:
              colrow: CR_0_0
              led_din: LED0
              led_dout: LED1
        pinky_l:
          key:
            column_net: COL1
          rows:
            mod:
              colrow: CR_1_3
              led_din: LED46
              led_dout: LED47
            bottom:
              colrow: CR_1_2
              led_din: LED25
              led_dout: LED26
            home:
              colrow: CR_1_1
              led_din: LED22
              led_dout: LED23
            top:
              colrow: CR_1_0
              led_din: LED1
              led_dout: LED2
        ring_l:
          key:
            column_net: COL2
          rows:
            mod:
              colrow: CR_2_3
              led_din: LED45
              led_dout: LED46
            bottom:
              colrow: CR_2_2
              led_din: LED26
              led_dout: LED27
            home:
              colrow: CR_2_1
              led_din: LED21
              led_dout: LED22
            top:
              colrow: CR_2_0
              led_din: LED2
              led_dout: LED3
        middle_l:
          key:
            column_net: COL3
          rows:
            mod:
              colrow: CR_3_3
              led_din: LED44
              led_dout: LED45
            bottom:
              colrow: CR_3_2
              led_din: LED27
              led_dout: LED28
            home:
              colrow: CR_3_1
              led_din: LED20
              led_dout: LED21
            top:
              colrow: CR_3_0
              led_din: LED3
              led_dout: LED4
        index_l:
          key:
            column_net: COL4
          rows:
            mod:
              colrow: CR_4_3
              led_din: LED43
              led_dout: LED44
            bottom:
              colrow: CR_4_2
              led_din: LED28
              led_dout: LED29
            home:
              colrow: CR_4_1
              led_din: LED19
              led_dout: LED20
            top:
              colrow: CR_4_0
              led_din: LED4
              led_dout: LED5
        inner_l:
          key:
            column_net: COL5
          rows:
            mod:
              colrow: CR_5_3
              led_din: LED42
              led_dout: LED43
            bottom:
              colrow: CR_5_2
              led_din: LED29
              led_dout: LED30
            home:
              colrow: CR_5_1
              led_din: LED18
              led_dout: LED19
            top:
              colrow: CR_5_0
              led_din: LED5
              led_dout: LED6
        inner_r:
          key:
            column_net: COL6
          rows:
            mod:
              colrow: CR_6_3
              led_din: LED41
              led_dout: LED42
            bottom:
              colrow: CR_6_2
              led_din: LED30
              led_dout: LED31
            home:
              colrow: CR_6_1
              led_din: LED17
              led_dout: LED18
            top:
              colrow: CR_6_0
              led_din: LED6
              led_dout: LED7
        index_r:
          key:
            column_net: COL7
          rows:
            mod:
              colrow: CR_7_3
              led_din: LED40
              led_dout: LED41
            bottom:
              colrow: CR_7_2
              led_din: LED31
              led_dout: LED32
            home:
              colrow: CR_7_1
              led_din: LED16
              led_dout: LED17
            top:
              colrow: CR_7_0
              led_din: LED7
              led_dout: LED8
        middle_r:
          key:
            column_net: COL8
          rows:
            mod:
              colrow: CR_8_3
              led_din: LED39
              led_dout: LED40
            bottom:
              colrow: CR_8_2
              led_din: LED32
              led_dout: LED33
            home:
              colrow: CR_8_1
              led_din: LED15
              led_dout: LED16
            top:
              colrow: CR_8_0
              led_din: LED8
              led_dout: LED9
        ring_r:
          key:
            column_net: COL9
          rows:
            mod:
              colrow: CR_9_3
              led_din: LED38
              led_dout: LED39
            bottom:
              colrow: CR_9_2
              led_din: LED33
              led_dout: LED34
            home:
              colrow: CR_9_1
              led_din: LED14
              led_dout: LED15
            top:
              colrow: CR_9_0
              led_din: LED9
              led_dout: LED10
        pinky_r:
          key:
            column_net: COL10
          rows:
            mod:
              colrow: CR_10_3
              led_din: LED37
              led_dout: LED38
            bottom:
              colrow: CR_10_2
              led_din: LED34
              led_dout: LED35
            home:
              colrow: CR_10_1
              led_din: LED13
              led_dout: LED14
            top:
              colrow: CR_10_0
              led_din: LED10
              led_dout: LED11
        outer_r:
          key:
            column_net: COL11
          rows:
            mod:
              colrow: CR_11_3
              led_din: LED36
              led_dout: LED37
            bottom:
              colrow: CR_11_2
              led_din: LED35
              led_dout: LED36
            home:
              colrow: CR_11_1
              led_din: LED12
              led_dout: LED13
            top:
              colrow: CR_11_0
              led_din: LED11
              led_dout: LED12
      rows:
        mod:
          row_net: ROW3
        bottom:
          row_net: ROW2
        home:
          row_net: ROW1
        top:
          row_net: ROW0

outlines:
  board:
    - what: rectangle
      where: true
      size: [kx + 4, ky + 4]
      corner: 2
    - what: rectangle
      where:
        ref: matrix_CR_11_0
        shift: [26.5, -1.5ky]
      size: [39, 4ky + 4]
      corner: 2
      operation: add
  keycaps:
    - what: rectangle
      where: true
      bound: false
      size: [kx - 0.5, ky - 0.5]

pcbs:
  p48v2:
    template: kicad8
    outlines:
      main:
        outline: board
    footprints:
      choc:
        what: ceoloide/switch_choc_v1_v2
        where: true
        params:
          from: "{{column_net}}"
          to: "{{colrow}}"
          choc_v1_support: true
          choc_v2_support: true
          hotswap: true
          include_keycap: true
          keycap_width: 18
          keycap_height: 17
          include_stabilizer_pad: true
      diode:
        what: ceoloide/diode_tht_sod123
        where: true
        adjust:
          shift: [0, -8.5]
        params:
          from: "{{colrow}}"
          to: "{{row_net}}"
          side: B
      led:
        what: ceoloide/led_sk6812mini-e
        where: true
        adjust:
          shift: [0, -4.7]
        params:
          P1: VCC
          P2: "{{led_dout}}"
          P3: GND
          P4: "{{led_din}}"
          side: B
          reverse_mount: true
          include_traces_vias: true
          signal_trace_width: 0.25
          gnd_trace_width: 0.25
          vcc_trace_width: 0.25
          via_size: 0.8
          via_drill: 0.4
