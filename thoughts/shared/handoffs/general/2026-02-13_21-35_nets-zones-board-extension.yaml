questions:
  - Which Adafruit SSD1306 1.3" revision is being used? Pinout order differs between revisions (SDA/SCL first vs GND/Vin first)
  - Should bypass caps for LED power be added now or after routing?

decisions:
  - pico_tht: User chose THT over SMD after testing placement - THT pins provide mechanical strength
  - encoder_b_cu: User flipped encoder to B.Cu to avoid contact interference
  - board_255mm: Extended to 255mm (was 250mm in previous handoff) - OLED needed 5mm more space
  - gnd_both_layers: GND copper pour on both F.Cu and B.Cu for better ground plane

findings:
  - ergogen_point_names: "Ergogen v4 names points using colrow values, not column/row names. e.g. matrix_CR_11_0 not matrix_outer_r_top"
  - mcp_zone_unsupported: "MCP swig backend doesn't support add_zone or add_net_class - must edit PCB file directly"
  - pad_net_script: "Python script for bulk pad net assignment works well but can miss the last pad in a footprint if it's immediately followed by a zone block - verify manually"
  - outline_edit_safe: "Editing Edge.Cuts gr_line/gr_arc coordinates directly in PCB file works cleanly - just update x coords and arc midpoints"

