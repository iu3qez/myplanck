questions:
  - Should the board outline extension be done in ergogen config.yaml or modified in pcbnew?
  - Exact Pico position in extension to avoid switch through-hole interference

decisions:
  - matrix_with_diodes: 4x12 matrix (16 GPIO) instead of direct-pin (48 GPIO) - allows Pico 2 which has 30 GPIO
  - pico_smd: Use Module:RaspberryPi_Pico_Common_SMD (castellated) not THT - THT holes interfere with switch holes
  - dual_side_layout: Pico on B.Cu, OLED on F.Cu - allows overlap, minimizes extension width
  - right_extension: 30mm extension on right side for Pico+OLED+encoder, board 250x72mm total
  - led_vbus: LED VCC direct from VBUS 5V (bypasses 3.3V regulator, handles 2.88A max)
  - oled_rotated: OLED 1.3" should be rotated 90 degrees to fit in narrow extension

findings:
  - ergogen_outline_bug: "size: [12kx+4, 4ky+4]" creates 220x72 rect per KEY then takes bounding box = 418x123mm. Correct is "size: [kx+4, ky+4]"
  - pico_smd_origin: SMD footprint origin is at CENTER (not pad 1). Pads at x=+/-9.69, y=-24.13 to +24.13
  - switch_holes: Each switch has 5 through-holes (center 5mm, 2x alignment 1.9mm, stabilizer 1.6mm, boss 3mm)
  - zero_conflict_zone: Pico fits horizontally at y<-106 or vertically at y<-140 with 0 switch hole conflicts
  - mcp_footprint_cache: MCP caches library paths at startup - must restart to pick up newly installed libs

worked:
  - Ergogen folder mode with ceoloide footprints works perfectly
  - MCP place_component works for initial placement (before delete cycles)
